<style>
  :root{
    --ink:#e9e2d0;
    --ink-dim:#a89d86;
    --steel-0:#0e1013;
    --steel-1:#181b20;
    --steel-2:#22262d;
    --line:#3a3f46;
    --crimson:#8c2f39;
    --crimson-bright:#b8404c;
    --brass:#c9a227;
    --brass-dim:#8a7223;
    --die:#5b7185;
    --shadow: 0 10px 30px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    min-height:100dvh;
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,.015) 0px, rgba(255,255,255,.015) 1px, transparent 1px, transparent 26px),
      radial-gradient(ellipse at 20% -10%, #23262c 0%, var(--steel-0) 55%);
    color:var(--ink);
    font-family:'EB Garamond', serif;
    font-size:19px;
    display:flex;
    justify-content:center;
    padding:48px 20px 90px;
    padding-top:calc(48px + env(safe-area-inset-top));
    padding-left:calc(20px + env(safe-area-inset-left));
    padding-right:calc(20px + env(safe-area-inset-right));
    padding-bottom:calc(90px + env(safe-area-inset-bottom));
    -webkit-tap-highlight-color:transparent;
  }
  .app{width:100%;max-width:920px;}
  .app.wide{max-width:1400px;}

  /* ---------- header / breadcrumb ---------- */
  .crumb{
    display:flex;align-items:center;gap:10px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--ink-dim);
    margin-bottom:26px;
    min-height:20px;
  }
  .crumb .seg{cursor:pointer;transition:color .15s;}
  .crumb .seg:hover{color:var(--brass);}
  .crumb .seg.current{color:var(--ink);cursor:default;}
  .crumb .sep{color:var(--line);}

  .back{
    background:none;border:1px solid var(--line);color:var(--ink-dim);
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.08em;
    padding:7px 14px;border-radius:2px;cursor:pointer;
    transition:all .15s;margin-bottom:22px;
  }
  .back:hover{border-color:var(--brass-dim);color:var(--brass);}

  h1{
    font-family:'Cinzel',serif;font-weight:700;
    font-size:clamp(28px,4vw,42px);
    letter-spacing:.03em;
    margin:0 0 6px;
    color:var(--ink);
  }
  .subtitle{
    color:var(--ink-dim);font-style:italic;font-size:17px;margin:0 0 34px;
    max-width:60ch;
  }
  .rule{
    height:1px;
    background:linear-gradient(90deg, var(--brass-dim), transparent 70%);
    margin:0 0 34px;
  }

  /* ---------- menu list (screens 1 & 2) ---------- */
  .menu-list{display:flex;flex-direction:column;gap:12px;}
  .menu-item{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--steel-1);
    border:1px solid var(--line);
    border-left:3px solid var(--brass-dim);
    padding:20px 24px;
    cursor:pointer;
    transition:background .15s, border-color .15s, transform .1s;
    position:relative;
  }
  .menu-item:hover:not(.disabled){
    background:var(--steel-2);
    border-left-color:var(--crimson-bright);
  }
  .menu-item:active:not(.disabled){transform:translateX(2px);}
  .menu-item .name{
    font-family:'Cinzel',serif;font-size:20px;letter-spacing:.02em;
  }
  .menu-item .desc{
    font-size:15px;color:var(--ink-dim);font-style:italic;margin-top:4px;
  }
  .menu-item .arrow{
    font-family:'JetBrains Mono',monospace;color:var(--brass);font-size:18px;
  }
  .menu-item.disabled{
    opacity:.4;cursor:not-allowed;border-left-color:var(--line);
  }
  .menu-item.disabled .arrow{color:var(--ink-dim);}
  .tag-soon{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--ink-dim);
    border:1px solid var(--line);padding:2px 7px;border-radius:2px;
  }
  .section-label{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.15em;
    text-transform:uppercase;color:var(--ink-dim);
    margin:28px 0 12px;
  }
  .menu-item.util{border-left-color:var(--die);}
  .menu-item.util:hover{border-left-color:var(--die);background:var(--steel-2);}

  .pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;}
  .pill{
    font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.04em;
    background:var(--steel-1);color:var(--ink-dim);
    border:1px solid var(--line);border-radius:2px;
    padding:8px 14px;cursor:pointer;transition:all .15s;
  }
  .pill:hover{border-color:var(--brass-dim);color:var(--ink);}
  .pill.active{
    background:var(--crimson);border-color:var(--crimson-bright);color:var(--ink);
  }
  .card.term .name{margin-bottom:6px;}

  .stance-block{margin-bottom:22px;}
  .stance-block .card{border-left:3px solid var(--brass-dim);}
  .stance-attacks-label{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;
    color:var(--brass);
    margin:10px 0 8px 6px;
  }
  .attacks-grid{
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    padding-left:18px;
    border-left:2px solid var(--line);
    margin-left:6px;
  }

  /* ---------- maneuver grid (screen 3) ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(255px,1fr));
    gap:14px;
  }
  .card{
    background:var(--steel-1);
    border:1px solid var(--line);
    padding:18px 18px 16px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:border-color .15s, background .15s, transform .08s;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
  }
  .card::before{
    content:"";position:absolute;top:0;left:0;right:0;height:3px;
    background:var(--crimson);opacity:.55;
    transition:opacity .15s;
  }
  .card:hover{background:var(--steel-2);border-color:var(--brass-dim);}
  .card:hover::before{opacity:1;}
  .card:active{transform:scale(.98);}
  .card .top-row{
    display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
    margin-bottom:10px;
  }
  .card .name{
    font-family:'Cinzel',serif;font-size:17px;line-height:1.3;
    letter-spacing:.01em;
  }
  .card .die-badge{
    flex-shrink:0;
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
    color:var(--die);
    border:1px solid var(--die);
    border-radius:2px;
    padding:2px 6px;
    letter-spacing:.05em;
  }
  .card .eng{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;
    color:var(--ink-dim);letter-spacing:.06em;text-transform:uppercase;
    margin-bottom:10px;
  }
  .card .desc{
    font-size:14.5px;line-height:1.45;color:var(--ink-dim);
  }
  .card .tmpl{
    font-family:'JetBrains Mono',monospace;font-size:13px;
    color:var(--brass);
    background:var(--steel-0);
    border:1px solid var(--line);
    padding:8px 10px;
    margin-bottom:10px;
    word-break:break-word;
  }
  .card.featured{
    border-color:var(--brass-dim);
    background:var(--steel-2);
  }
  .card.featured::before{background:var(--brass);opacity:.8;}
  .card.featured .name{font-size:20px;}
  .card.featured .tmpl{font-size:16px;padding:12px 14px;color:var(--brass);}

  .gen-btn{
    display:block;width:100%;margin-top:10px;
    font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.03em;
    background:var(--steel-2);border:1px solid var(--line);color:var(--brass);
    padding:8px 8px;border-radius:2px;cursor:pointer;transition:all .15s;
    text-align:center;line-height:1.3;
  }
  .gen-btn:hover{border-color:var(--brass-dim);background:var(--steel-0);}
  .gen-stamp{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:rgba(14,16,19,.92);
    opacity:0;pointer-events:none;
    transition:opacity .15s;
  }
  .gen-stamp.active{opacity:1;}
  .gen-die{position:relative;width:64px;height:64px;}
  .gen-die svg{width:100%;height:100%;display:block;filter:drop-shadow(0 6px 10px rgba(0,0,0,.5));}
  .gen-die .val{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'Cinzel',serif;font-weight:700;font-size:22px;color:#fff;
    text-shadow:0 2px 4px rgba(0,0,0,.55);
  }
  .gen-die.rolling{animation:diceshake .14s linear infinite;}

  /* stamp feedback */
  .stamp{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:rgba(14,16,19,.88);
    opacity:0;pointer-events:none;
    transition:opacity .12s;
  }
  .card.stamped .stamp{opacity:1;transition:opacity .05s;}
  .stamp span{
    font-family:'Cinzel',serif;font-weight:700;font-size:15px;
    letter-spacing:.15em;text-transform:uppercase;
    color:var(--crimson-bright);
    border:2px solid var(--crimson-bright);
    padding:6px 14px;
    transform:rotate(-6deg) scale(1.15);
    animation:stampin .32s cubic-bezier(.2,1.6,.4,1) forwards;
  }
  @keyframes stampin{
    0%{transform:rotate(-6deg) scale(1.8);opacity:0;}
    60%{opacity:1;}
    100%{transform:rotate(-6deg) scale(1);opacity:1;}
  }

  /* ---------- dice roller ---------- */
  .dice-tray{
    min-height:230px;
    background:var(--steel-0);
    border:1px solid var(--line);
    display:flex;flex-wrap:wrap;gap:18px;
    align-items:center;justify-content:center;
    padding:28px 20px;
  }
  .dice-tray .empty-hint{
    color:var(--ink-dim);font-style:italic;font-size:15.5px;text-align:center;line-height:1.6;
  }
  .die{width:88px;height:88px;position:relative;cursor:pointer;transition:transform .15s, filter .15s;}
  .die:hover{transform:scale(1.07);filter:brightness(1.12);}
  .die svg{width:100%;height:100%;display:block;filter:drop-shadow(0 5px 10px rgba(0,0,0,.45));}
  .die .val{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'Cinzel',serif;font-weight:700;font-size:27px;color:#fff;
    text-shadow:0 2px 4px rgba(0,0,0,.55);pointer-events:none;
  }
  .die.s4 .val{padding-top:22px;font-size:22px;}
  .die.s10 .val{padding-bottom:12px;}
  .die.rolling{animation:diceshake .14s linear infinite;}
  @keyframes diceshake{
    0%{transform:rotate(-10deg) scale(1.06);}
    50%{transform:rotate(10deg) scale(.96);}
    100%{transform:rotate(-10deg) scale(1.06);}
  }
  .dice-total-row{
    display:flex;align-items:baseline;justify-content:flex-end;gap:14px;
    margin:14px 0 2px;
  }
  .dice-total-row .cap{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);}
  .dice-total-row .sum{font-family:'Cinzel',serif;font-weight:700;font-size:44px;color:var(--ink);line-height:1;}
  .dice-notation{
    text-align:right;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--ink-dim);
    min-height:18px;margin-bottom:16px;
  }
  .die-pick{
    display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center;
    border-top:1px solid var(--line);padding-top:18px;margin-bottom:16px;
  }
  .die-btn{background:none;border:none;cursor:pointer;padding:2px;transition:transform .12s;}
  .die-btn:hover{transform:translateY(-4px);}
  .die-btn svg{width:46px;height:46px;display:block;filter:drop-shadow(0 3px 6px rgba(0,0,0,.4));}
  .mod-ctrl{
    display:flex;align-items:center;gap:8px;margin-left:14px;padding-left:16px;border-left:1px solid var(--line);
  }
  .mod-ctrl .cap{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-dim);letter-spacing:.08em;text-transform:uppercase;}
  .mod-btn{
    width:30px;height:30px;border:1px solid var(--line);background:var(--steel-1);color:var(--ink);
    font-family:'JetBrains Mono',monospace;font-size:16px;cursor:pointer;border-radius:2px;transition:all .15s;
  }
  .mod-btn:hover{border-color:var(--brass-dim);color:var(--brass);}
  .mod-val{font-family:'JetBrains Mono',monospace;font-size:15px;min-width:36px;text-align:center;color:var(--ink);}
  .dice-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .btn-primary{
    font-family:'Cinzel',serif;font-weight:700;font-size:15px;letter-spacing:.05em;
    background:var(--crimson);border:1px solid var(--crimson-bright);color:var(--ink);
    padding:11px 26px;border-radius:2px;cursor:pointer;transition:all .15s;
  }
  .btn-primary:hover:not(:disabled){background:var(--crimson-bright);}
  .btn-ghost{
    font-family:'JetBrains Mono',monospace;font-size:13px;
    background:var(--steel-1);border:1px solid var(--line);color:var(--ink-dim);

/* ---------- dice roller state & logic ---------- */
const DICE_TYPES = [4,6,8,10,12,20];
const DICE_COLORS = {
  4:{light:'#58a86a',dark:'#2c5837'},
  6:{light:'#43a3b3',dark:'#205761'},
  8:{light:'#8a67c4',dark:'#4a3470'},
  10:{light:'#c45a90',dark:'#6e2c4d'},
  12:{light:'#cc5560',dark:'#772930'},
  20:{light:'#e09a45',dark:'#8a561d'}
};
const DICE_LABEL_Y = {4:76,6:62,8:60,10:54,12:64,20:60};
let diceState = {dice:[], modifier:0, counter:0};

function dieShapeSvg(sides, uid, label){
  const c = DICE_COLORS[sides];
  const gid = 'grad_'+uid;
  let shape='';
  if(sides===4) shape = `<polygon points="50,6 96,90 4,90" fill="url(#${gid})" stroke="rgba(0,0,0,.25)"/>`;
  else if(sides===6) shape = `<rect x="9" y="9" width="82" height="82" rx="14" fill="url(#${gid})" stroke="rgba(0,0,0,.25)"/>`;
  else if(sides===8) shape = `<polygon points="50,4 96,50 50,96 4,50" fill="url(#${gid})" stroke="rgba(0,0,0,.25)"/><line x1="50" y1="4" x2="50" y2="96" stroke="rgba(0,0,0,.14)"/>`;
  else if(sides===10) shape = `<polygon points="50,4 93,42 50,96 7,42" fill="url(#${gid})" stroke="rgba(0,0,0,.25)"/><polyline points="7,42 50,58 93,42" fill="none" stroke="rgba(0,0,0,.14)"/><line x1="50" y1="58" x2="50" y2="96" stroke="rgba(0,0,0,.14)"/>`;
  else if(sides===12) shape = `<polygon points="50,4 95,38 78,94 22,94 5,38" fill="url(#${gid})" stroke="rgba(0,0,0,.25)"/>`;
  else shape = `<polygon points="50,3 91,26 91,74 50,97 9,74 9,26" fill="url(#${gid})" stroke="rgba(0,0,0,.25)"/><polygon points="50,24 75,63 25,63" fill="rgba(255,255,255,.07)" stroke="rgba(0,0,0,.16)"/>`;
  const text = (label!==undefined && label!==null)
    ? `<text x="50" y="${DICE_LABEL_Y[sides]}" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="32" fill="#fff">${label}</text>`
    : '';
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="${c.light}"/><stop offset="1" stop-color="${c.dark}"/></linearGradient></defs>${shape}${text}</svg>`;
}

function trayDieHtml(d){
  return `<div class="die s${d.sides}" data-id="${d.id}" title="Убрать кость">
    ${dieShapeSvg(d.sides, d.id)}
    <div class="val">${d.value}</div>
  </div>`;
}

function currentDiceTotal(){
  if(!diceState.dice.length) return 0;
  return diceState.dice.reduce((s,d)=>s+d.value,0) + diceState.modifier;
}

function diceNotation(compact){
  const groups={};
  diceState.dice.forEach(d=>{groups[d.sides]=(groups[d.sides]||0)+1;});
  const parts=Object.keys(groups).map(Number).sort((a,b)=>b-a).map(s=>`${groups[s]}d${s}`);
  let n=parts.join(compact?'+':' + ');
  const m=diceState.modifier;
  if(m>0) n+=(compact?'+':' + ')+m;
  else if(m<0) n+=(compact? String(m) : ' − '+Math.abs(m));
  return n;
}

function animateDie(el, sides, finalValue, dur){
  const valEl = el.querySelector('.val');
  if(!valEl) return;
  if(el._diceIv) clearInterval(el._diceIv);
  el.classList.add('rolling');
  const start = performance.now();
  el._diceIv = setInterval(()=>{
    valEl.textContent = 1+Math.floor(Math.random()*sides);
    if(performance.now()-start>=dur){
      clearInterval(el._diceIv); el._diceIv=null;
      el.classList.remove('rolling');
      valEl.textContent=finalValue;
    }
  },70);
}

function updateDiceReadout(){
  const totalEl=document.getElementById('diceTotal');
  const notEl=document.getElementById('diceNotation');
  if(totalEl) totalEl.textContent = diceState.dice.length ? currentDiceTotal() : '—';
  if(notEl) notEl.textContent = diceState.dice.length ? diceNotation(false) : '';
}

function updateDiceControls(){
  const has = diceState.dice.length>0;
  ['rollAllBtn','clearDiceBtn','copyResultBtn'].forEach(id=>{
    const b=document.getElementById(id);
    if(b) b.disabled = !has;
  });
}

function addDie(sides){
  const tray = document.querySelector('.dice-tray');
  if(!tray){ render(); return; } // подстраховка, если экран ещё не отрисован

  const id='die'+(++diceState.counter);
  const value=1+Math.floor(Math.random()*sides);
  diceState.dice.push({id,sides,value});

  const hint = tray.querySelector('.empty-hint');
  if(hint) hint.remove();

  const holder = document.createElement('div');
  holder.innerHTML = trayDieHtml({id,sides,value});
  const el = holder.firstElementChild;
  tray.appendChild(el);
  el.addEventListener('click', ()=>removeDie(id));

  updateDiceControls();
  const totalEl=document.getElementById('diceTotal');
  if(totalEl) totalEl.textContent='…';

  const dur=520+Math.random()*300;
  animateDie(el,sides,value,dur);
  setTimeout(updateDiceReadout, dur+90);
}

function removeDie(id){
  diceState.dice = diceState.dice.filter(d=>d.id!==id);
  const el=document.querySelector(`.die[data-id="${id}"]`);
  if(el){
    if(el._diceIv) clearInterval(el._diceIv);
    el.remove();
  }
  const tray = document.querySelector('.dice-tray');
  if(tray && !diceState.dice.length){
    tray.innerHTML = `<div class="empty-hint">Нажмите на кость внизу — она появится здесь и сразу будет брошена.<br>Клик по кости на поле убирает её.</div>`;
  }
  updateDiceControls();
  updateDiceReadout();
}

function rollAllDice(){
  if(!diceState.dice.length) return;
  let maxDur=0;
  const totalEl=document.getElementById('diceTotal');
  if(totalEl) totalEl.textContent='…';
  diceState.dice.forEach(d=>{
    d.value=1+Math.floor(Math.random()*d.sides);
    const el=document.querySelector(`.die[data-id="${d.id}"]`);
    if(!el) return;
    const dur=520+Math.random()*300;
    maxDur=Math.max(maxDur,dur);
    animateDie(el,d.sides,d.value,dur);
  });
  setTimeout(updateDiceReadout, maxDur+90);
}

function copyDiceResult(){
  if(!diceState.dice.length) return;
  const text=`*[Результат броска ${diceNotation(true)}: ${currentDiceTotal()} ]*`;
  copyText(text);
  const btn=document.getElementById('copyResultBtn');
  if(btn){
    const old=btn.textContent;
    btn.textContent='Скопировано ✓';
    setTimeout(()=>{btn.textContent=old;},900);
  }
}

let genRollCounter = 0;

function rollSpecValue(count, sides, mode){
  const rolls=[];
  for(let i=0;i<count;i++) rolls.push(1+Math.floor(Math.random()*sides));
  let value;
  if(mode==='max') value=Math.max(...rolls);
  else if(mode==='min') value=Math.min(...rolls);
  else value=rolls.reduce((a,b)=>a+b,0);
  return value;
}

function handleGenerateClick(btn){
  const template = btn.getAttribute('data-template');
  const count = parseInt(btn.getAttribute('data-count'),10);
  const sides = parseInt(btn.getAttribute('data-sides'),10);
  const mode = btn.getAttribute('data-mode');
  const value = rollSpecValue(count, sides, mode);
  const finalText = template.replace(': ]*', ': '+value+' ]*');
  copyText(finalText);

  const card = btn.closest('.card');
  if(!card) return;
  const overlay = card.querySelector('.gen-stamp');
  const holder = overlay ? overlay.querySelector('.gen-die') : null;
  if(!overlay || !holder) return;

  const uid = 'gen'+(++genRollCounter);
  holder.innerHTML = dieShapeSvg(sides, uid) + `<div class="val"></div>`;
  const valEl = holder.querySelector('.val');

  overlay.classList.add('active');
  holder.classList.add('rolling');
  const dur = 480;
  const start = performance.now();
  const iv = setInterval(()=>{
    valEl.textContent = 1+Math.floor(Math.random()*sides);
    if(performance.now()-start>=dur){
      clearInterval(iv);
      holder.classList.remove('rolling');
      valEl.textContent = value;
    }
  },70);

  clearTimeout(overlay._genT);
  overlay._genT = setTimeout(()=>{ overlay.classList.remove('active'); }, dur+950);
}

      <div class="grid">${items.map(maneuverCard).join('')}</div>

  };

  return `
    ${renderCrumb([{label:'Компендиум', nav:'home'},{label:'Воин', nav:'class:fighter'},{label:'Мастер боя'}])}
    <button class="back" data-go="class:fighter">← Назад</button>
    <h1>Мастер боя</h1>
    <p class="subtitle">Клик по карточке копирует название приёма; кнопка ниже — сразу бросает кость превосходства и копирует готовый результат.</p>
    <div class="rule"></div>
    ${groupSection('Атакующие', 'offense')}
    ${groupSection('Защитные', 'defense')}
    ${groupSection('Тактические', 'tactics')}
    <div class="footnote">Правила 2024 г. · Player's Handbook · Combat Superiority</div>
  `;
}

function escapeAttr(s){
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function wireEvents(){
  document.querySelectorAll('[data-go]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const val = el.getAttribute('data-go');
      navigate(val);
    });
  });
  document.querySelectorAll('[data-nav]').forEach(el=>{
    const val = el.getAttribute('data-nav');
    if(val) el.addEventListener('click', ()=>navigate(val));
  });
  document.querySelectorAll('.card').forEach(el=>{
    el.addEventListener('click', ()=>{
      const text = el.getAttribute('data-copy');
      copyText(text);
      el.classList.remove('stamped');
      void el.offsetWidth; // restart animation
      el.classList.add('stamped');
      clearTimeout(el._t);
      el._t = setTimeout(()=>el.classList.remove('stamped'), 850);
    });
  });
  document.querySelectorAll('.gen-btn').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      handleGenerateClick(el);
    });
  });
  document.querySelectorAll('.pill').forEach(el=>{
    el.addEventListener('click', ()=>{
      view.weapon = el.getAttribute('data-weapon');
      render();
    });
  });
  document.querySelectorAll('.die-btn').forEach(el=>{
    el.addEventListener('click', ()=>addDie(parseInt(el.getAttribute('data-sides'),10)));
  });
  document.querySelectorAll('.dice-tray .die').forEach(el=>{
    el.addEventListener('click', ()=>removeDie(el.getAttribute('data-id')));
  });
  const rollBtn=document.getElementById('rollAllBtn');
  if(rollBtn) rollBtn.addEventListener('click', rollAllDice);
  const clearBtn=document.getElementById('clearDiceBtn');
  if(clearBtn) clearBtn.addEventListener('click', ()=>{
    document.querySelectorAll('.dice-tray .die').forEach(el=>{ if(el._diceIv) clearInterval(el._diceIv); });
    diceState.dice=[];
    render();
  });
  const copyBtn=document.getElementById('copyResultBtn');
  if(copyBtn) copyBtn.addEventListener('click', copyDiceResult);
  const modMinus=document.getElementById('modMinus');
  if(modMinus) modMinus.addEventListener('click', ()=>{
    diceState.modifier--;
    const mv=document.querySelector('.mod-val');
    if(mv) mv.textContent=(diceState.modifier>0?'+':'')+diceState.modifier;
    updateDiceReadout();
  });
  const modPlus=document.getElementById('modPlus');
  if(modPlus) modPlus.addEventListener('click', ()=>{
    diceState.modifier++;
    const mv=document.querySelector('.mod-val');
    if(mv) mv.textContent=(diceState.modifier>0?'+':'')+diceState.modifier;
    updateDiceReadout();
  });
}

function navigate(val){
  const parts = val.split(':');
  if(parts[0]==='home') view = {screen:'home'};
  else if(parts[0]==='commands') view = {screen:'commands'};
  else if(parts[0]==='dice') view = {screen:'dice'};
  else if(parts[0]==='map') view = {screen:'map'};
  else if(parts[0]==='glossary') view = {screen:'glossary'};
  else if(parts[0]==='weapons') view = {screen:'weapons', weapon: view.weapon || 'longsword'};
  else if(parts[0]==='class') view = {screen:'class', cls:parts[1]};
  else if(parts[0]==='sub') view = {screen:'sub', cls:parts[1], sub:parts[2]};
  render();
  window.scrollTo(0,0);
}

function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position='fixed';
  ta.style.opacity='0';
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
}

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
